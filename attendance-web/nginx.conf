server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API calls to the server container.
    # The React app uses "/api/v1" as its base URL (built-in default),
    # so the full request path is preserved and forwarded as-is.
    location /api/v1 {
        proxy_pass         http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # React Router — serve index.html for all unmatched paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
